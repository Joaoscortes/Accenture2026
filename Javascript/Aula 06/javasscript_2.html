<body>
  
  <script>
    const cars = [];
    

    class Car {
      constructor(name, color, numberOfDoors = 2){
        this.name = name;
        this.color = color;
        this.doors = numberOfDoors;
        this.tyres = 4;
      }

      toString() {
        return "Name: "+this.name+" , Color: "+this.color;
      }

    }

    let bwm = new Car("Bmw", "Blue");
    cars.push(bwm);


  </script>
