<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index</title>
</head>

<body>

  <script>
    const numbers = [12, 3, 4, 5, 6, 7, 12, 12, 7, 8];


    /********************************************************************************
     *
     *       Desafio: Identificar o número mais repetido e apresente os seus índices
     *
     ********************************************************************************/
    // 12 : 0 6 7
    // '12' '0,6,7'
    // [0,6,7]
    // { number: 12, indexes: [0,6,7]}

    function getNumberIndexes(num) {
      const result = [];

      for (let index = 0; index < numbers.length; index++) {
        if (numbers[index] === num) {
          result.push(index);
        }
      }
      return result;
    }

    function countNumber() {

      let result = {
        number: 0,
        count: 0
      }

      // [12, 3, 4, 5, 6, 7, 12, 12, 7, 8]
      for (let indexOut = 0; indexOut < numbers.length; indexOut++) {
        const elementOut = numbers[indexOut];
        let count = 1; // 1

        for (let indexIn = indexOut + 1; indexIn < numbers.length; indexIn++) {
          const elementIn = numbers[indexIn];
          if (elementIn === elementOut) {
            count++;
          }
        }

        if (count > result.count) {
          result.number = elementOut;
          result.count = count;
        }
      }

      console.log('Number: '+result.number+' , Indexes : '+getNumberIndexes(result.number));

    }


    countNumber();
  </script>
</body>

</html>
