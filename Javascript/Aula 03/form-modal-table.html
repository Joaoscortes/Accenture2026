<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1 form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container">
  <div class="text-center">
    <img
      src="https://ml919w4mrvj0.i.optimole.com/w:443/h:95/q:mauto/f:best/https://www.upacademy.pt/media/UP-Academy-Logo-Retina-Website.png"
      alt="Img UpAcademy">
    <h1>Primeiro form</h1>
  </div>


  <form class="bg-info p-3">
    <div class="row mb-3">
      <label for="inputEmail" class="col-sm-2 col-form-label">Email</label>
      <div class="col-sm-10">
        <input type="email" class="form-control" id="inputEmail">
      </div>
    </div>
    <div class="row mb-3">
      <label for="inputAddress" class="col-sm-2 col-form-label">Address</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="inputAddress">
      </div>
    </div>
    <div class="row mb-3">
      <label for="inputName" class="col-sm-2 col-form-label">Name</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="inputName">
      </div>
    </div>
    <div class="row mb-3">
      <label for="inputNumber" class="col-sm-2 col-form-label">Number</label>
      <div class="col-sm-10">
        <input type="number" class="form-control" id="inputNumber">
      </div>
    </div>
    <div class="row mb-3">
      <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
      <div class="col-sm-10">
        <input type="password" class="form-control" id="inputPassword">
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-2" for="inputMale">
        Male
      </label>
      <input class="col-2" type="radio" name="genderInput" id="inputMale" value="male">
      <label class="col-2" for="inputMale">
        Female
      </label>
      <input class="col-2" type="radio" name="genderInput" id="inputFemale" value="female">
      <label class="col-2" for="inputMale">
        Other
      </label>
      <input class="col-2" type="radio" name="genderInput" id="inputOther" value="other">
    </div>
    <div class="row mb-3">
      <label for="inputSelect" class="col-sm-2 col-form-label">Club</label>
      <div class="col-sm-10">
        <select class="form-select" aria-label="Default select example" id="inputSelect">
          <option value="benfica">Benfica</option>
          <option value="porto">Porto</option>
          <option value="sporting">Sporting</option>
        </select>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-sm-10 offset-sm-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="gridCheck1">
          <label class="form-check-label" for="gridCheck1">
            Example checkbox
          </label>
        </div>
      </div>
    </div>
    <div class="text-center">
      <button type="button" class="btn btn-danger">Send</button>
    </div>
  </form>

  <!-- Button trigger modal -->
  <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#dataModal">
    View data
  </button>

  <!-- Modal -->
  <div class="modal fade" id="dataModal" tabindex="-1" aria-labelledby="dataModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="dataModalLabel">Table data</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th scope="col">Email</th>
                  <th scope="col">Address</th>
                  <th scope="col">Name</th>
                  <th scope="col">Number</th>
                  <th scope="col">Password</th>
                  <th scope="col">Gender</th>
                  <th scope="col">Club</th>
                  <th scope="col">RGPD</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>zecarlos@gato.come</td>
                  <td>rua de cima</td>
                  <td>ze carlos</td>
                  <td>1</td>
                  <td>ze</td>
                  <td>male</td>
                  <td>sporting</td>
                  <td>true</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
